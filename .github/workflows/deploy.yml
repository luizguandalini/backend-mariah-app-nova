# Force Rebuild - Triggering Chromium Install
name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite trigger manual

env:
  NODE_VERSION: '20'

jobs:
  # ================================
  # Job 1: Build e Verificação
  # ================================
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Instalar dependências
        run: npm install --legacy-peer-deps

      - name: 🔨 Build
        run: npm run build

      - name: ✅ Build concluído
        run: echo "Build concluído com sucesso!"

  # ================================
  # Job 2: Deploy para EC2
  # ================================
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 20  # Aumentado para dar tempo ao build no EC2 Free Tier
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m  # Timeout do comando SSH (15 minutos)
          script: |
            echo "📦 Iniciando deploy..."
            
            # Navega para o diretório do projeto
            cd /home/ec2-user/backend-novamaria
            
            # ================================
            # VERIFICAÇÃO INTELIGENTE DE ESPAÇO EM DISCO
            # ================================
            echo "💾 Verificando espaço em disco..."
            DISK_REQUIRED=5  # Mínimo de 5GB necessários
            
            # Função para verificar espaço disponível
            check_disk_space() {
              df -BG / | awk 'NR==2 {print $4}' | sed 's/G//'
            }
            
            # Verificação inicial
            DISK_AVAILABLE=$(check_disk_space)
            echo "📊 Espaço disponível: ${DISK_AVAILABLE}GB"
            echo "📊 Espaço necessário: ${DISK_REQUIRED}GB"
            
            # Se não houver espaço suficiente, tenta limpeza automática
            if [ "$DISK_AVAILABLE" -lt "$DISK_REQUIRED" ]; then
              echo "⚠️ Espaço insuficiente detectado. Iniciando limpeza automática..."
              
              # ===== TENTATIVA 1: Limpeza Docker Básica =====
              echo "🧹 [Tentativa 1/3] Limpeza Docker básica..."
              docker container prune -f
              docker image prune -f
              docker volume prune -f
              
              DISK_AVAILABLE=$(check_disk_space)
              echo "📊 Espaço após limpeza básica: ${DISK_AVAILABLE}GB"
              
              if [ "$DISK_AVAILABLE" -ge "$DISK_REQUIRED" ]; then
                echo "✅ Espaço liberado com sucesso! Continuando deploy..."
              else
                # ===== TENTATIVA 2: Limpeza Docker Agressiva =====
                echo "🧹 [Tentativa 2/3] Limpeza Docker agressiva (removendo imagens não utilizadas)..."
                docker system prune -a -f
                
                DISK_AVAILABLE=$(check_disk_space)
                echo "📊 Espaço após limpeza agressiva: ${DISK_AVAILABLE}GB"
                
                if [ "$DISK_AVAILABLE" -ge "$DISK_REQUIRED" ]; then
                  echo "✅ Espaço liberado com sucesso! Continuando deploy..."
                else
                  # ===== TENTATIVA 3: Limpeza de Logs e Cache do Sistema =====
                  echo "🧹 [Tentativa 3/3] Limpeza de logs e cache do sistema..."
                  
                  # Limpa logs antigos do Docker
                  echo "Limpando logs do Docker..."
                  sudo find /var/lib/docker/containers/ -type f -name "*.log" -delete 2>/dev/null || true
                  
                  # Limpa logs do sistema (mantém últimos 7 dias)
                  echo "Limpando logs do sistema..."
                  sudo journalctl --vacuum-time=7d 2>/dev/null || true
                  
                  # Limpa cache do npm (se existir)
                  echo "Limpando cache do npm..."
                  npm cache clean --force 2>/dev/null || true
                  
                  # Limpa arquivos temporários
                  echo "Limpando arquivos temporários..."
                  sudo rm -rf /tmp/* 2>/dev/null || true
                  
                  DISK_AVAILABLE=$(check_disk_space)
                  echo "📊 Espaço após limpeza completa: ${DISK_AVAILABLE}GB"
                  
                  if [ "$DISK_AVAILABLE" -ge "$DISK_REQUIRED" ]; then
                    echo "✅ Espaço liberado com sucesso! Continuando deploy..."
                  else
                    # ===== FALHA: Não foi possível liberar espaço suficiente =====
                    echo "❌ ERRO: Não foi possível liberar espaço suficiente!"
                    echo "❌ Disponível após todas as tentativas: ${DISK_AVAILABLE}GB"
                    echo "❌ Necessário: ${DISK_REQUIRED}GB"
                    echo "❌ Deploy abortado para manter versão atual rodando."
                    echo ""
                    echo "📋 Ações recomendadas:"
                    echo "  1. Conecte-se ao servidor via SSH"
                    echo "  2. Execute: df -h (para ver uso de disco)"
                    echo "  3. Execute: du -sh /var/lib/docker (para ver uso do Docker)"
                    echo "  4. Considere aumentar o tamanho do disco da instância EC2"
                    exit 1
                  fi
                fi
              fi
            else
              echo "✅ Espaço em disco suficiente. Continuando deploy..."
            fi
            
            # Pull das últimas alterações
            echo "⬇️ Baixando alterações..."
            git pull origin main

            # ================================
            # MIGRAÇÕES: garante flags de ambiente no .env.prod
            # (o schema é controlado por migrações, não mais por synchronize)
            # ================================
            echo "🔧 Garantindo flags de migração no .env.prod..."
            touch .env.prod
            grep -q '^PROD_DB_MIGRATIONS_RUN=' .env.prod || echo 'PROD_DB_MIGRATIONS_RUN=true' >> .env.prod
            grep -q '^PROD_DB_SYNCHRONIZE=' .env.prod || echo 'PROD_DB_SYNCHRONIZE=false' >> .env.prod

            # Guarda a imagem atual como backup
            echo "💾 Criando backup da imagem atual..."
            docker tag mariah-backend:latest mariah-backend:backup 2>/dev/null || true
            
            # Rebuild e restart dos containers
            echo "🔨 Reconstruindo containers..."
            docker-compose -f docker-compose.prod.yml build --no-cache

            # ================================
            # MIGRAÇÕES: baseline da transição (auto-protegido / idempotente)
            # - 1ª vez num banco legado (synchronize): marca as migrações
            #   existentes como aplicadas SEM rodar o SQL.
            # - Depois disso: não faz nada (a tabela "migrations" já existe) e
            #   as migrações NOVAS rodam no boot do app via migrationsRun.
            # Roda num container one-off (sem subir rabbitmq) ANTES do down: se
            # falhar, aborta o deploy com a versão antiga ainda no ar.
            # ================================
            echo "🗃️ Baseline/checagem de migrações..."
            docker-compose -f docker-compose.prod.yml run --rm --no-deps backend node dist/database/baseline-migrations.js

            # Para containers antigos
            echo "⏹️ Parando containers antigos..."
            docker-compose -f docker-compose.prod.yml down

            # Sobe novos containers
            echo "▶️ Iniciando novos containers..."
            docker-compose -f docker-compose.prod.yml up -d
            
            # Aguarda e verifica health
            echo "⏳ Aguardando inicialização (30s)..."
            sleep 30
            
            # Testa health check
            echo "🏥 Verificando health check..."
            if curl -f http://localhost:80/health; then
              echo ""
              echo "✅ Deploy concluído com sucesso!"
            else
              echo "❌ Health check falhou! Restaurando backup..."
              docker-compose -f docker-compose.prod.yml down
              docker tag mariah-backend:backup mariah-backend:latest
              docker-compose -f docker-compose.prod.yml up -d
              echo "🔄 Versão anterior restaurada."
              exit 1
            fi
            
            # Limpeza de imagens antigas
            echo "🧹 Limpando imagens não utilizadas..."
            docker image prune -f
            
            echo "🎉 Deploy finalizado!"

      - name: 📊 Status do Deploy
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deploy realizado com sucesso!"
          else
            echo "❌ Deploy falhou. Verifique os logs acima."
          fi
