name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 30
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -Eeuo pipefail

            PROJECT_DIR="/home/ec2-user/backend-novamaria"
            COMPOSE_FILE="docker-compose.prod.yml"
            MIN_FREE_GB=1

            section() {
              echo "::group::$1"
            }

            endsection() {
              echo "::endgroup::"
            }

            show_resources() {
              echo "--- memory ---"
              free -h || true
              echo "--- disk ---"
              df -h / || true
              echo "--- docker usage ---"
              docker system df || true
              echo "--- containers ---"
              docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Size}}' || true
            }

            ensure_swap() {
              if swapon --show | grep -q '/swapfile'; then
                echo "Swap already enabled."
                swapon --show
                return
              fi

              echo "Creating 2G swapfile to protect small EC2 builds from OOM."
              if [ ! -f /swapfile ]; then
                sudo fallocate -l 2G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=128M count=16
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
              fi
              sudo swapon /swapfile || true
              grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab >/dev/null
              swapon --show || true
            }

            free_gb() {
              df -BG / | awk 'NR==2 {gsub("G","",$4); print $4}'
            }

            safe_cleanup() {
              echo "Cleaning safe, rebuildable system data only."
              docker builder prune -af || true
              docker container prune -f || true
              docker image prune -af || true
              docker network prune -f || true
              sudo find /var/lib/docker/containers -type f -name '*-json.log' -exec truncate -s 0 {} \; 2>/dev/null || true
              sudo journalctl --vacuum-time=2d 2>/dev/null || true
              find /tmp -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
              npm cache clean --force 2>/dev/null || true
            }

            section "1. Preflight"
            cd "$PROJECT_DIR"
            show_resources
            ensure_swap
            endsection

            section "2. Update source"
            git fetch origin main
            git reset --hard origin/main
            touch .env.prod
            grep -q '^PROD_DB_MIGRATIONS_RUN=' .env.prod || echo 'PROD_DB_MIGRATIONS_RUN=true' >> .env.prod
            grep -q '^PROD_DB_SYNCHRONIZE=' .env.prod || echo 'PROD_DB_SYNCHRONIZE=false' >> .env.prod
            git log --oneline -1
            endsection

            section "3. Disk cleanup if needed"
            DISK_AVAILABLE="$(free_gb)"
            echo "Available disk: ${DISK_AVAILABLE}GB; required before build: ${MIN_FREE_GB}GB"
            if [ "$DISK_AVAILABLE" -lt "$MIN_FREE_GB" ]; then
              safe_cleanup
            else
              echo "Disk is sufficient; pruning old build cache anyway to keep the 8GB volume stable."
              docker builder prune -af || true
            fi
            show_resources
            endsection

            section "4. Build backend image"
            docker tag mariah-backend:latest mariah-backend:backup 2>/dev/null || true
            docker-compose -f "$COMPOSE_FILE" build backend
            endsection

            section "5. Migration baseline"
            docker-compose -f "$COMPOSE_FILE" run --rm --no-deps backend node dist/database/baseline-migrations.js
            endsection

            section "6. Restart services"
            docker-compose -f "$COMPOSE_FILE" down
            docker-compose -f "$COMPOSE_FILE" up -d
            docker ps --format 'table {{.Names}}\t{{.Status}}'
            endsection

            section "7. Health check"
            sleep 30
            if curl -f http://localhost:80/health; then
              echo "Deploy completed successfully."
            else
              echo "Health check failed. Restoring previous image."
              docker-compose -f "$COMPOSE_FILE" down
              docker tag mariah-backend:backup mariah-backend:latest
              docker-compose -f "$COMPOSE_FILE" up -d
              exit 1
            fi
            endsection

            section "8. Final cleanup and status"
            docker builder prune -af || true
            docker image prune -f || true
            show_resources
            endsection
